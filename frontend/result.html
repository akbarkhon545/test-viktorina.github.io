<!-- frontend/result.html -->
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Natija</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 flex items-center justify-center min-h-screen">
  <div class="max-w-md mx-auto bg-white dark:bg-gray-800 p-6 rounded shadow text-center">
    <h2 class="text-2xl font-bold mb-4">Test natijalari</h2>
    <p id="scoreText" class="text-lg mb-4"></p>
    <canvas id="resultChart" width="400" height="400"></canvas>
    <a href="profile.html" class="mt-4 inline-block text-blue-500 hover:underline">Profilimga o'tish</a>
  </div>

  <script>
    // LocalStorage dan oxirgi natijani olish
    const resultData = JSON.parse(localStorage.getItem('lastResult'));
    if (resultData) {
      const correct = resultData.correctCount;
      const total = resultData.total;
      const wrong = total - correct;
      const scorePercent = Math.round((correct / total) * 100);
      // Natija matnini chiqarish
      document.getElementById('scoreText').innerText = 
        `To'g'ri javoblar: ${correct}/${total} ta (${scorePercent}%)`;
      // Chart.js orqali doira diagrammasini chizish (to'g'ri vs noto'g'ri)
      const ctx = document.getElementById('resultChart').getContext('2d');
      new Chart(ctx, {
        type: 'pie',
        data: {
          labels: ['To\'g\'ri javoblar', 'Noto\'g\'ri javoblar'],
          datasets: [{
            data: [correct, wrong],
            backgroundColor: ['#4CAF50', '#F44336']
          }]
        },
        options: {
          plugins: {
            legend: { position: 'bottom' }
          }
        }
      });
    } else {
      document.getElementById('scoreText').innerText = "Natija topilmadi.";
    }
  </script>
</body>
</html>
