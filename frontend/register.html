<!-- frontend/register.html (faqat asosiy qism ko'rsatilgan) -->
<form id="registerForm">
  <input type="text" name="name" placeholder="Ismingiz" required />
  <input type="email" name="email" placeholder="Email" required />
  <input type="password" name="password" placeholder="Parol" required />
  <button type="submit">Ro'yxatdan o'tish</button>
</form>
<script>
  document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    // ... formdan name, email, password olish ...
    const res = await fetch('/api/auth/register', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password }), credentials: 'include'
    });
    if (res.ok) {
      alert("Ro'yxat muvaffaqiyatli! Endi tizimga kiring.");
      window.location.href = "login.html";
    } else {
      alert("Ro'yxatdan o'tishda xato: " + await res.text());
    }
  });
</script>
