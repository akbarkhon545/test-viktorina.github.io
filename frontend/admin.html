<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interaktiv Viktorina va Admin Paneli</title>
  <!-- XLSX kutubxonasi Excel fayllarni o'qish uchun -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <!-- Google Fonts: Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* CSS o'zgaruvchilari (light mode) */
    :root {
      --primary-color: #4a90e2;
      --primary-gradient: linear-gradient(45deg, #4a90e2, #50e3c2);
      --secondary-color: rgba(255, 255, 255, 0.9);
      --text-color: #333;
      --white-color: #fff;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
      --option-bg: #f9f9f9;
      --option-bg-hover: #e9e9e9;
    }
    /* Dark mode uchun o'zgarishlar */
    body.dark-mode {
      --primary-color: #90caf9;
      --primary-gradient: linear-gradient(45deg, #90caf9, #64b5f6);
      --secondary-color: #121212;
      --text-color: #e0e0e0;
      --white-color: #1e1e1e;
      --option-bg: #2c2c2c;
      --option-bg-hover: #3a3a3a;
    }
    * {
      box-sizing: border-box;
      transition: all 0.3s ease;
    }
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      background: var(--secondary-color) url('https://source.unsplash.com/1600x900/?nature,water') no-repeat center center fixed;
      background-size: cover;
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: var(--primary-gradient);
      color: var(--white-color);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header .left-section {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header nav a {
      color: var(--white-color);
      margin: 0 10px;
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
    }
    header nav a:hover {
      text-decoration: underline;
    }
    #themeToggle {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--white-color);
    }
    main {
      flex: 1;
      padding: 20px;
      max-width: 1200px;
      margin: 20px auto;
      width: 90%;
    }
    .container {
      background: var(--white-color);
      border-radius: 12px;
      padding: 25px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      position: relative;
    }
    h1, h2, h3 {
      color: var(--primary-color);
      margin-top: 0;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background: var(--primary-gradient);
      color: var(--white-color);
      font-size: 16px;
      cursor: pointer;
      margin: 5px;
    }
    button:hover {
      filter: brightness(90%);
    }
    input[type="file"], input[type="text"], input[type="password"], select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin: 8px 0;
      width: 100%;
      font-size: 16px;
    }
    .hidden {
      display: none;
    }
    /* Quiz uslubi */
    #quizSection .question-container {
      margin-bottom: 20px;
    }
    .option-label {
      display: block;
      background: var(--option-bg);
      border-radius: 6px;
      padding: 12px;
      margin: 10px 0;
      cursor: pointer;
    }
    .option-label:hover {
      background: var(--option-bg-hover);
    }
    .progress-bar {
      width: 100%;
      height: 10px;
      background: #e0e0e0;
      border-radius: 5px;
      margin: 15px 0;
    }
    .progress {
      height: 100%;
      background: var(--primary-color);
      border-radius: 5px;
      transition: width 0.3s;
    }
    /* Submission paneli markazda */
    #submissionPanel {
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 8px;
      background: #fafafa;
      box-shadow: var(--shadow);
      margin: 20px auto;
      width: 80%;
      display: none;
      text-align: center;
    }
    /* Responsive dizayn */
    @media (max-width: 768px) {
      header {
        flex-direction: column;
      }
      #submissionPanel {
        width: 90%;
      }
    }
  </style>
</head>
<body>
  <!-- Navigatsiya -->
  <header>
    <div class="left-section">
      <strong>Viktorina</strong>
      <button id="themeToggle" onclick="toggleTheme()" title="Mavzuni almashtirish">🌙</button>
    </div>
    <nav id="navLinks"></nav>
  </header>

  <main>
    <!-- Login sahifasi -->
    <section id="loginSection" class="container">
      <h2>Kirish</h2>
      <form onsubmit="login(event)">
        <label for="loginUsername">Login:</label>
        <input type="text" id="loginUsername" placeholder="Login kiriting" required>
        <label for="loginPassword">Parol:</label>
        <input type="password" id="loginPassword" placeholder="Parol kiriting" required>
        <button type="submit" title="Kirish">Kirish</button>
      </form>
    </section>

    <!-- Quiz bo'limi -->
    <section id="quizSection" class="container hidden">
      <h1>Interaktiv Viktorina</h1>
      <div id="modeButtons">
        <button onclick="selectMode('exam')" title="Imtihon rejimi">Imtihon</button>
        <button onclick="selectMode('practice')" title="Mashq rejimi">Mashq</button>
      </div>
      <div id="testSelector" class="hidden">
        <label for="testDropdown">Testni tanlang:</label>
        <select id="testDropdown"></select>
      </div>
      <button id="startTestButton" class="hidden" onclick="startTest()" title="Boshlash">Boshlash</button>
      <div id="quiz" class="hidden">
        <div id="timer">⏳ 25:00</div>
        <div class="question-container" id="questionDisplay"></div>
        <div id="feedback"></div>
        <div class="progress-bar">
          <div id="progress" class="progress"></div>
        </div>
        <div id="quizControls">
          <button onclick="previousQuestion()" title="Oldingi">⬅️</button>
          <button onclick="nextQuestion()" title="Keyingi">➡️</button>
          <button onclick="finishQuiz()" title="Yakunla">✔️</button>
        </div>
      </div>
      <div id="submissionPanel">
        <div id="resultSummary"></div>
        <button onclick="backToHome()" title="Asosiy menyu">Asosiy menyu</button>
      </div>
    </section>

    <!-- Admin Paneli -->
    <section id="adminPanel" class="container hidden">
      <h2>Admin Paneli</h2>
      <hr>
      <h3>Excel orqali test qo'shish</h3>
      <input type="file" id="adminFileInput" accept=".xlsx" multiple>
      <button onclick="uploadTests()">Yukla</button>
      <ul id="adminTestsList"></ul>
      <hr>
      <h3>Foydalanuvchilar</h3>
      <p>Foydalanuvchilar soni: <span id="userCount"></span></p>
      <ul id="usersList"></ul>
      <h3>Yangi foydalanuvchi qo'shish</h3>
      <form id="addUserForm" onsubmit="addUser(event)">
        <label for="newUsername">Login:</label>
        <input type="text" id="newUsername" required>
        <label for="newPassword">Parol:</label>
        <input type="password" id="newPassword" required>
        <button type="submit">Qo'shish</button>
      </form>
    </section>
  </main>

  <script>
    /************* Foydalanuvchilar va Kirish *************/
    let users = [];
    let currentUser = null;
    
    function loadUsersFromStorage() {
      const stored = localStorage.getItem("users");
      users = stored ? JSON.parse(stored) : [];
      if (users.length === 0) {
        // Standart admin hisobi (lokal front-end uchun; backend admin hisobi yaratiladi alohida)
        users.push({username: "admin", password: "admin", role: "admin"});
        localStorage.setItem("users", JSON.stringify(users));
      }
    }
    
    function updateNav() {
      const nav = document.getElementById("navLinks");
      nav.innerHTML = "";
      if (currentUser) {
        let logoutLink = document.createElement("a");
        logoutLink.innerText = "🚪";
        logoutLink.title = "Chiqish";
        logoutLink.style.fontSize = "32px";
        logoutLink.onclick = logout;
        nav.appendChild(logoutLink);
      }
    }
    
    function login(e) {
      e.preventDefault();
      const usernameField = document.getElementById("loginUsername");
      const passwordField = document.getElementById("loginPassword");
      const username = usernameField.value;
      const password = passwordField.value;
      const user = users.find(u => u.username === username && u.password === password);
      if (user) {
        currentUser = user;
        resetQuizState();
        document.getElementById("loginSection").classList.add("hidden");
        updateNav();
        if (user.role === "admin") {
          showSection("adminPanel");
        } else {
          showSection("quizSection");
        }
      } else {
        alert("Login yoki parol noto'g'ri!");
      }
    }
    
    function logout() {
      currentUser = null;
      document.getElementById("loginUsername").value = "";
      document.getElementById("loginPassword").value = "";
      resetQuizState();
      document.getElementById("quizSection").classList.add("hidden");
      document.getElementById("adminPanel").classList.add("hidden");
      document.getElementById("loginSection").classList.remove("hidden");
      updateNav();
    }
    
    function addUser(e) {
      e.preventDefault();
      const newUsername = document.getElementById("newUsername").value;
      const newPassword = document.getElementById("newPassword").value;
      if (users.find(u => u.username === newUsername)) {
        alert("Bu login allaqachon mavjud!");
        return;
      }
      users.push({username: newUsername, password: newPassword, role: "user"});
      localStorage.setItem("users", JSON.stringify(users));
      alert("Yangi foydalanuvchi qo'shildi!");
      populateUsersList();
    }
    
    function populateUsersList() {
      const list = document.getElementById("usersList");
      list.innerHTML = "";
      users.forEach(user => {
        let li = document.createElement("li");
        li.textContent = user.username + (user.role === "admin" ? " (Admin)" : "");
        list.appendChild(li);
      });
      document.getElementById("userCount").innerText = users.length;
    }
    
    function showSection(sectionId) {
      if (!currentUser) {
        alert("Iltimos, tizimga kiring.");
        return;
      }
      document.getElementById("loginSection").classList.add("hidden");
      document.getElementById("quizSection").classList.add("hidden");
      document.getElementById("adminPanel").classList.add("hidden");
      document.getElementById(sectionId).classList.remove("hidden");
      if (sectionId === "quizSection") {
        loadTestsFromStorage();
        document.getElementById("modeButtons").classList.remove("hidden");
        document.getElementById("testSelector").classList.add("hidden");
        document.getElementById("startTestButton").classList.add("hidden");
        document.getElementById("quiz").classList.add("hidden");
        document.getElementById("submissionPanel").style.display = "none";
      }
      if (sectionId === "adminPanel") {
        populateUsersList();
      }
    }
    
    /************* Test va Quiz funksiyalari *************/
    let tests = [];
    let currentTest = null;
    let questions = [];
    let currentQuestionIndex = 0;
    let correctAnswers = 0;
    let timeLeft = 1500;
    let timerInterval;
    let isExamMode = false;
    let userAnswers = [];
    let testStartTime = null;
    
    function saveTestsToStorage() {
      localStorage.setItem("excelTests", JSON.stringify(tests));
    }
    
    function loadTestsFromStorage() {
      const stored = localStorage.getItem("excelTests");
      tests = stored ? JSON.parse(stored) : [];
      populateTestDropdown();
      populateAdminTestsList();
    }
    
    function populateTestDropdown() {
      const dropdown = document.getElementById("testDropdown");
      dropdown.innerHTML = "";
      if (tests.length === 0) {
        dropdown.innerHTML = "<option value=''>Hozircha test yo'q</option>";
      } else {
        tests.forEach((test, index) => {
          let option = document.createElement("option");
          option.value = index;
          option.text = test.name;
          dropdown.appendChild(option);
        });
      }
    }
    
    function populateAdminTestsList() {
      const list = document.getElementById("adminTestsList");
      list.innerHTML = "";
      tests.forEach((test, index) => {
        let li = document.createElement("li");
        li.textContent = test.name;
        let delButton = document.createElement("button");
        delButton.textContent = "O'chir";
        delButton.onclick = () => { deleteTest(index); };
        li.appendChild(delButton);
        list.appendChild(li);
      });
    }
    
    function deleteTest(index) {
      if (confirm("Ushbu testni o'chirishni xohlaysizmi?")) {
        tests.splice(index, 1);
        saveTestsToStorage();
        loadTestsFromStorage();
      }
    }
    
    function uploadTests() {
      const files = document.getElementById("adminFileInput").files;
      if (files.length === 0) {
        alert("Iltimos, fayl tanlang.");
        return;
      }
      Array.from(files).forEach(file => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const base64Data = e.target.result;
          tests.push({ name: file.name, data: base64Data });
          saveTestsToStorage();
          loadTestsFromStorage();
          alert(file.name + " yuklandi.");
        };
        reader.readAsDataURL(file);
      });
    }
    
    function selectMode(mode) {
      isExamMode = (mode === "exam");
      if (isExamMode) {
        document.getElementById("timer").classList.remove("hidden");
      } else {
        document.getElementById("timer").classList.add("hidden");
      }
      document.getElementById("modeButtons").classList.add("hidden");
      document.getElementById("testSelector").classList.remove("hidden");
      document.getElementById("startTestButton").classList.remove("hidden");
    }
    
    function loadSelectedTest() {
      const dropdown = document.getElementById("testDropdown");
      const index = dropdown.value;
      if (index === "" || !tests[index]) {
        alert("Iltimos, test tanlang.");
        return;
      }
      currentTest = tests[index];
      const base64Str = currentTest.data.split(",")[1];
      const binaryStr = atob(base64Str);
      const len = binaryStr.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) {
        bytes[i] = binaryStr.charCodeAt(i);
      }
      const workbook = XLSX.read(bytes, { type: "array", cellStyles: true });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const jsonData = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false });
      questions = [];
      for (let i = 1; i < jsonData.length; i++) {
        let row = jsonData[i];
        let questionText = row[0];
        let options = row.slice(1, 5);
        let correctAnswer = options[0];
        questions.push({
          question: questionText,
          options: options.sort(() => Math.random() - 0.5),
          correct: correctAnswer
        });
      }
      if (isExamMode && questions.length > 25) {
        questions = getRandomSubset(questions, 25);
      } else {
        questions = questions.sort(() => Math.random() - 0.5);
      }
      userAnswers = new Array(questions.length).fill(null);
      currentQuestionIndex = 0;
      correctAnswers = 0;
      timeLeft = 1500;
    }
    
    function getRandomSubset(arr, n) {
      let result = [];
      let copy = arr.slice();
      for (let i = 0; i < n; i++) {
        const randomIndex = Math.floor(Math.random() * copy.length);
        result.push(copy[randomIndex]);
        copy.splice(randomIndex, 1);
      }
      return result;
    }
    
    function startTest() {
      const dropdown = document.getElementById("testDropdown");
      if (dropdown.value === "" || !tests[dropdown.value]) {
        alert("Iltimos, test tanlang.");
        return;
      }
      loadSelectedTest();
      testStartTime = new Date();
      document.getElementById("quiz").classList.remove("hidden");
      document.getElementById("testSelector").classList.add("hidden");
      document.getElementById("startTestButton").classList.add("hidden");
      displayQuestion();
      if (isExamMode) {
        startTimer();
      }
    }
    
    function startTimer() {
      document.getElementById("timer").classList.remove("hidden");
      timerInterval = setInterval(() => {
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          finishQuiz();
        } else {
          let minutes = Math.floor(timeLeft / 60);
          let seconds = timeLeft % 60;
          document.getElementById("timer").innerText = `⏳ ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
          timeLeft--;
        }
      }, 1000);
    }
    
    function displayQuestion() {
      let question = questions[currentQuestionIndex];
      let quizHTML = `<h2>${question.question}</h2>`;
      question.options.forEach((option, index) => {
        const checked = (userAnswers[currentQuestionIndex] === option) ? "checked" : "";
        quizHTML += `
          <label class="option-label">
            <input type="radio" name="answer" value="${option}" onchange="selectAnswer(${index})" ${checked}>
            ${option}
          </label>`;
      });
      document.getElementById("questionDisplay").innerHTML = quizHTML;
      updateProgress();
    }
    
    function selectAnswer(index) {
      let selectedAnswer = questions[currentQuestionIndex].options[index];
      userAnswers[currentQuestionIndex] = selectedAnswer;
      if (!isExamMode) {
        if (selectedAnswer === questions[currentQuestionIndex].correct) {
          document.getElementById("feedback").innerHTML = `<p style="color:green;">To'g'ri!</p>`;
        } else {
          document.getElementById("feedback").innerHTML = `<p style="color:red;">Noto'g'ri! (To'g'ri: ${questions[currentQuestionIndex].correct})</p>`;
        }
      } else {
        document.getElementById("feedback").innerHTML = "";
      }
    }
    
    function nextQuestion() {
      document.getElementById("feedback").innerHTML = "";
      if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex++;
        displayQuestion();
      } else {
        finishQuiz();
      }
    }
    
    function previousQuestion() {
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        displayQuestion();
      }
    }
    
    function finishQuiz() {
      if (isExamMode) {
        clearInterval(timerInterval);
        correctAnswers = 0;
        for (let i = 0; i < questions.length; i++) {
          if (userAnswers[i] === questions[i].correct) {
            correctAnswers++;
          }
        }
      }
      clearInterval(timerInterval);
      let elapsedTime = Math.floor((new Date() - testStartTime) / 1000);
      let minutes = Math.floor(elapsedTime / 60);
      let seconds = elapsedTime % 60;
      
      document.getElementById("quiz").classList.add("hidden");
      
      let resultHTML = `<h2>Natija: ${correctAnswers}/${questions.length}</h2>`;
      resultHTML += `<h3>To'g'ri: ${correctAnswers}</h3>`;
      resultHTML += `<h3>Noto'g'ri: ${questions.length - correctAnswers}</h3>`;
      resultHTML += `<h3>Vaqt: ${minutes} daqiqa ${seconds} soniya</h3>`;
      
      document.getElementById("resultSummary").innerHTML = resultHTML;
      document.getElementById("submissionPanel").style.display = "block";
    }
    
    function updateProgress() {
      let progress = document.getElementById("progress");
      progress.style.width = ((currentQuestionIndex + 1) / questions.length) * 100 + "%";
    }
    
    function resetQuizState() {
      currentTest = null;
      questions = [];
      currentQuestionIndex = 0;
      correctAnswers = 0;
      timeLeft = 1500;
      userAnswers = [];
      clearInterval(timerInterval);
      document.getElementById("feedback").innerHTML = "";
      document.getElementById("questionDisplay").innerHTML = "";
      document.getElementById("timer").innerText = "⏳ 25:00";
    }
    
    function backToHome() {
      resetQuizState();
      document.getElementById("submissionPanel").style.display = "none";
      document.getElementById("modeButtons").classList.remove("hidden");
      document.getElementById("testSelector").classList.add("hidden");
      document.getElementById("startTestButton").classList.add("hidden");
    }
    
    /************* Dark/Light Mode *************/
    function toggleTheme() {
      document.body.classList.toggle("dark-mode");
      const btn = document.getElementById("themeToggle");
      if(document.body.classList.contains("dark-mode")) {
        btn.innerText = "☀️";
        btn.title = "Light mode";
      } else {
        btn.innerText = "🌙";
        btn.title = "Dark mode";
      }
    }
    
    /************* Yuklanishda *************/
    window.onload = function() {
      loadUsersFromStorage();
      updateNav();
      loadTestsFromStorage();
      document.getElementById("loginSection").classList.remove("hidden");
      document.getElementById("quizSection").classList.add("hidden");
      document.getElementById("adminPanel").classList.add("hidden");
    }
  </script>
</body>
</html>
