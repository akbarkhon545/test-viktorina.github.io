<!-- frontend/admin.html (asosiy qismlar) -->
<body class="...">
  <div class="max-w-xl mx-auto mt-8 p-4 bg-white dark:bg-gray-800 rounded">
    <h2 class="text-2xl font-bold mb-4">Admin Panel</h2>
    <!-- Savol import qilish bo'limi -->
    <div class="mb-6">
      <h3 class="text-xl font-semibold mb-2">Savollarni import qilish:</h3>
      <input type="file" id="fileInput" accept=".csv, .xlsx" class="block mb-2"/>
      <button onclick="uploadQuestions()" class="px-4 py-2 bg-blue-600 text-white rounded">Yuklash</button>
    </div>
    <!-- Foydalanuvchilar ro'yxati bo'limi -->
    <div>
      <h3 class="text-xl font-semibold mb-2">Foydalanuvchilar:</h3>
      <ul id="usersList" class="list-disc list-inside text-sm"></ul>
    </div>
  </div>

  <script>
    // Foydalanuvchilar ro'yxatini yuklash
    fetch('/api/admin/users', { credentials: 'include' })
      .then(res => res.json())
      .then(users => {
        const list = document.getElementById('usersList');
        users.forEach(u => {
          const li = document.createElement('li');
          li.textContent = `${u.name} (${u.email}) - role: ${u.role}`;
          list.appendChild(li);
        });
      })
      .catch(err => console.error("Foydalanuvchilarni olishda xato:", err));

    // Savollar faylini serverga yuborish
    function uploadQuestions() {
      const fileInput = document.getElementById('fileInput');
      if (!fileInput.files.length) {
        alert("Iltimos, faylni tanlang.");
        return;
      }
      const formData = new FormData();
      formData.append('file', fileInput.files[0]);
      fetch('/api/admin/import', {
        method: 'POST',
        body: formData,
        credentials: 'include'
      }).then(res => {
        if (res.ok) {
          alert("Savollar bazaga muvaffaqiyatli import qilindi!");
        } else {
          res.text().then(txt => alert("Importda xato: " + txt));
        }
      }).catch(err => console.error("Yuklashda xato:", err));
    }
  </script>
</body>
