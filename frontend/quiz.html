<!-- frontend/quiz.html -->
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100">
  <div class="max-w-2xl mx-auto p-4">
    <!-- Progress bar -->
    <div id="progressBar" class="bg-gray-300 dark:bg-gray-700 rounded h-4 mb-4">
      <div id="progressFill" class="bg-blue-600 h-4 rounded" style="width: 0%;"></div>
    </div>
    <!-- Savol matni va variantlar -->
    <div id="questionContainer" class="mb-6">
      <h2 id="questionText" class="text-lg font-medium"></h2>
      <ul id="optionsList" class="mt-3 space-y-2"></ul>
    </div>
    <!-- Navigatsiya tugmalari -->
    <div class="flex justify-between">
      <button id="prevBtn" class="px-4 py-2 bg-gray-500 text-white rounded" disabled>◀ Orqaga</button>
      <button id="nextBtn" class="px-4 py-2 bg-blue-500 text-white rounded">Keyingisi ▶</button>
      <button id="finishBtn" class="px-4 py-2 bg-green-600 text-white rounded hidden">Testni Yakunlash</button>
    </div>
  </div>

  <script>
    const queryParams = new URLSearchParams(window.location.search);
    const mode = queryParams.get('mode') || 'exam'; // rejim (default imtihon)
    let questions = [];
    let currentIndex = 0;
    let answers = [];  // foydalanuvchi tanlagan javoblar

    // Serverdan savollarni olish
    fetch(`/api/quiz/questions?mode=${mode}`, { credentials: 'include' })
      .then(res => res.json())
      .then(data => {
        questions = data;
        if (questions.length > 0) {
          showQuestion(0);
        }
      })
      .catch(err => console.error("Savollarni olishda xato:", err));

    function showQuestion(index) {
      currentIndex = index;
      const q = questions[index];
      document.getElementById('questionText').innerText = `${index+1}. ${q.text}`;
      // Variantlarni chiqarish
      const optionsList = document.getElementById('optionsList');
      optionsList.innerHTML = "";  // tozalash
      q.options.forEach((opt, i) => {
        const li = document.createElement('li');
        li.innerHTML = `
          <label class="inline-flex items-center space-x-2 cursor-pointer">
            <input type="radio" name="option" value="${i}" class="form-radio text-blue-600">
            <span>${opt}</span>
          </label>`;
        optionsList.appendChild(li);
      });
      // Avvalgi tanlangan javob bo'lsa, belgilash
      if (answers[index] !== undefined) {
        const radios = document.getElementsByName('option');
        if (radios[answers[index]]) radios[answers[index]].checked = true;
      }
      // Progress bar yangilash
      document.getElementById('progressFill').style.width = ((index+1) / questions.length * 100) + '%';
      // Tugmalar holatini yangilash
      document.getElementById('prevBtn').disabled = index === 0;
      if (index === questions.length - 1) {
        document.getElementById('nextBtn').classList.add('hidden');
        document.getElementById('finishBtn').classList.remove('hidden');
      } else {
        document.getElementById('nextBtn').classList.remove('hidden');
        document.getElementById('finishBtn').classList.add('hidden');
      }
    }

    // Tugmalar uchun hodisa handlerlari
    document.getElementById('prevBtn').onclick = () => {
      // Joriy tanlovni saqlash
      saveAnswer();
      if (currentIndex > 0) showQuestion(currentIndex - 1);
    };
    document.getElementById('nextBtn').onclick = () => {
      saveAnswer();
      if (currentIndex < questions.length - 1) showQuestion(currentIndex + 1);
    };
    document.getElementById('finishBtn').onclick = () => {
      saveAnswer();
      finishQuiz();
    };

    function saveAnswer() {
      const selected = document.querySelector('input[name="option"]:checked');
      answers[currentIndex] = selected ? parseInt(selected.value) : undefined;
    }

    function finishQuiz() {
      // Serverga foydalanuvchi javoblarini yuborish va natija olish
      fetch('/api/quiz/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ mode, answers: answers })
      })
        .then(res => res.json())
        .then(resultData => {
          // Natijani saqlab, result sahifasiga o'tish
          localStorage.setItem('lastResult', JSON.stringify(resultData));
          window.location.href = "result.html";
        })
        .catch(err => console.error("Natijani yuborishda xato:", err));
    }
  </script>
</body>
</html>
